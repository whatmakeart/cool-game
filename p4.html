<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pacific Strike: Swarm</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
            background-color: #0b1d2e; touch-action: none;
            font-family: 'Courier New', Courier, monospace; user-select: none;
            -webkit-user-select: none;
        }
        canvas { display: block; }
        #ui-layer {
            position: absolute; top: 15px; left: 15px; color: #00ffff;
            pointer-events: none; text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            z-index: 5;
        }
        h1 { margin: 0; font-size: 1.5rem; text-transform: uppercase; letter-spacing: 2px;}
        p { margin: 5px 0 0 0; font-size: 0.9rem; opacity: 0.8; color: #fff; }
        
        /* The overlay is now strictly layered and uses cursor-pointer to ensure tap reception */
        #start-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(4, 20, 36, 0.9); display: flex; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 100; cursor: pointer;
        }
        #start-overlay h2 { color: #00ffff; font-size: 2rem; margin: 0 0 10px 0; }
        #start-overlay p { color: #aaa; font-size: 1rem; }
    </style>
</head>
<body>

    <div id="start-overlay">
        <h2 id="overlay-text">TAP TO START</h2>
        <p>Initializes Audio & Game Engine</p>
    </div>
    
    <div id="ui-layer">
        <h1>Pacific Strike</h1>
        <p>Tap your island (Cyan), then target.</p>
    </div>
    
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const overlay = document.getElementById('start-overlay');
        const overlayText = document.getElementById('overlay-text');
        
        let width, height, lastTime = 0, gameActive = false, gridOffset = 0;

        // --- Generative Audio Engine ---
        let audioCtx;
        function initAudio() {
            if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if(audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playSound(type) {
            if(!audioCtx || audioCtx.state !== 'running') return;
            const t = audioCtx.currentTime;
            
            if (type === 'launch') {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, t);
                osc.frequency.exponentialRampToValueAtTime(80, t + 0.2);
                gain.gain.setValueAtTime(0.05, t);
                gain.gain.exponentialRampToValueAtTime(0.01, t + 0.2);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(t); osc.stop(t + 0.2);
            } 
            else if (type === 'explosion') {
                // Generative white noise for bombs
                const bufferSize = audioCtx.sampleRate * 0.5;
                const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
                
                const noise = audioCtx.createBufferSource();
                noise.buffer = buffer;
                
                const filter = audioCtx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(800, t);
                filter.frequency.exponentialRampToValueAtTime(50, t + 0.5);

                const gain = audioCtx.createGain();
                gain.gain.setValueAtTime(0.4, t);
                gain.gain.exponentialRampToValueAtTime(0.01, t + 0.5);
                
                noise.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
                noise.start(t);
            }
        }

        // --- SVG Graphics via Path2D ---
        // Fighter plane shape (top-down view)
        const planeSVG = new Path2D("M 0,-14 C 2,-10 2,-4 2,-2 L 14,-2 L 14,2 L 2,2 L 2,8 L 6,12 L -6,12 L -2,8 L -2,2 L -14,2 L -14,-2 L -2,-2 C -2,-4 -2,-10 0,-14 Z");
        // Simple bomb shape
        const bombSVG = new Path2D("M 0,-6 C 4,-2 4,4 0,8 C -4,4 -4,-2 0,-6 Z M -3,-8 L 3,-8 L 0,-5 Z");

        // Game State
        const TEAM_NEUTRAL = 0, TEAM_PLAYER = 1, TEAM_ENEMY = 2;
        const COLORS = {
            [TEAM_NEUTRAL]: { border: '#777777', fill: '#3a5a40' },
            [TEAM_PLAYER]:  { border: '#00ffff', fill: '#1a4a4a' },
            [TEAM_ENEMY]:   { border: '#ff3333', fill: '#4a1a1a' },
            sand: '#a39171'
        };

        let islands = [], fleets = [], effects = [], selectedIsland = null;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- Game Entities ---

        class Island {
            constructor(x, y, radius, owner) {
                this.x = x; this.y = y; this.baseRadius = radius; this.owner = owner;
                this.maxPlanes = Math.floor(radius * 2);
                this.planes = owner === TEAM_NEUTRAL ? Math.floor(radius / 2) : 40;
                this.productionRate = radius / 35; 
                
                // Generative coastline
                this.vertices = [];
                for (let i = 0; i < 20; i++) {
                    const angle = (i / 20) * Math.PI * 2;
                    const r = radius * (0.8 + Math.random() * 0.25); 
                    this.vertices.push({ x: Math.cos(angle) * r, y: Math.sin(angle) * r });
                }
            }

            update(dt) {
                if (this.owner !== TEAM_NEUTRAL && this.planes < this.maxPlanes) {
                    this.planes += this.productionRate * dt;
                }
            }

            draw(ctx) {
                // Outer glow & selection ring
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.baseRadius + 15, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(28, 163, 236, 0.15)`; ctx.fill();

                if (this === selectedIsland) {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.baseRadius + 22 + Math.sin(Date.now()/100)*4, 0, Math.PI * 2);
                    ctx.strokeStyle = COLORS[this.owner].border;
                    ctx.lineWidth = 2; ctx.stroke();
                }

                // Generative Island Rendering
                ctx.save();
                ctx.translate(this.x, this.y);
                
                // Beach/Sand layer
                ctx.fillStyle = COLORS.sand;
                ctx.strokeStyle = COLORS[this.owner].border;
                ctx.lineWidth = this === selectedIsland ? 4 : 2;
                ctx.beginPath();
                this.vertices.forEach((v, i) => i === 0 ? ctx.moveTo(v.x, v.y) : ctx.lineTo(v.x, v.y));
                ctx.closePath();
                ctx.fill(); ctx.stroke();
                
                // Inland layer
                ctx.fillStyle = COLORS[this.owner].fill;
                ctx.beginPath();
                this.vertices.forEach((v, i) => i === 0 ? ctx.moveTo(v.x * 0.7, v.y * 0.7) : ctx.lineTo(v.x * 0.7, v.y * 0.7));
                ctx.closePath();
                ctx.fill();
                ctx.restore();

                // Numbers
                ctx.fillStyle = 'rgba(0,0,0,0.6)';
                ctx.beginPath(); ctx.arc(this.x, this.y, 16, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = 'white'; ctx.font = 'bold 16px Courier New';
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(Math.floor(this.planes), this.x, this.y);
            }
        }

        class Fleet {
            constructor(source, target, count) {
                this.x = source.x; this.y = source.y; 
                this.target = target; this.count = count; this.owner = source.owner;
                this.speed = 110;
                this.angle = Math.atan2(target.y - source.y, target.x - source.x);
                this.age = 0;

                // Generative Swarm Pattern
                this.swarm = [];
                const visualPlanes = Math.min(count, 15); // Don't draw 100 planes, cap visually
                for(let i=0; i<visualPlanes; i++) {
                    this.swarm.push({
                        ox: (Math.random() - 0.5) * 35, // X offset
                        oy: (Math.random() - 0.5) * 35, // Y offset
                        phase: Math.random() * Math.PI * 2, // Wobble start
                        speed: 3 + Math.random() * 3 // Wobble speed
                    });
                }
                playSound('launch');
            }

            update(dt) {
                this.age += dt;
                this.x += Math.cos(this.angle) * this.speed * dt;
                this.y += Math.sin(this.angle) * this.speed * dt;

                if (Math.hypot(this.target.x - this.x, this.target.y - this.y) < this.target.baseRadius) {
                    this.arrive(); return true; 
                }
                return false;
            }

            arrive() {
                if (this.target.owner === this.owner) {
                    this.target.planes += this.count;
                } else {
                    this.target.planes -= this.count;
                    effects.push(new Explosion(this.target.x, this.target.y, COLORS[this.owner].border));
                    playSound('explosion');

                    if (this.target.planes < 0) {
                        this.target.owner = this.owner;
                        this.target.planes = Math.abs(this.target.planes);
                    }
                }
            }

            draw(ctx) {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle + Math.PI/2); // Align SVG to trajectory

                ctx.fillStyle = COLORS[this.owner].border;
                this.swarm.forEach(p => {
                    // Calculate organic clustering wobble
                    const swayX = Math.sin(this.age * p.speed + p.phase) * 8;
                    const swayY = Math.cos(this.age * p.speed * 0.8 + p.phase) * 4;
                    
                    ctx.save();
                    ctx.translate(p.ox + swayX, p.oy + swayY);
                    ctx.rotate(Math.sin(this.age * 10 + p.phase) * 0.1); // Pitch wobble
                    ctx.scale(0.8, 0.8);
                    ctx.fill(planeSVG);
                    ctx.restore();
                });

                ctx.rotate(-(this.angle + Math.PI/2)); // Reset text rotation
                ctx.fillStyle = 'white'; ctx.font = '14px Courier New';
                ctx.fillText(Math.floor(this.count), 0, -30);
                ctx.restore();
            }
        }

        class Explosion {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.color = color;
                this.age = 0; this.maxAge = 0.8;
                
                // Splatter Particles
                this.particles = [];
                for(let i=0; i<12; i++){
                    this.particles.push({
                        vx: (Math.random()-0.5)*200, 
                        vy: (Math.random()-0.5)*200, 
                        size: Math.random()*3 + 1
                    });
                }
                
                // Dropping SVG bombs
                this.bombs = [];
                for(let i=0; i<4; i++){
                    this.bombs.push({
                        x: (Math.random()-0.5)*40,
                        y: -30 - Math.random()*20,
                        vy: 80 + Math.random()*40,
                        rot: Math.random() * Math.PI
                    });
                }
            }
            update(dt) {
                this.age += dt; 
                this.particles.forEach(p => { p.x = p.vx * this.age; p.y = p.vy * this.age; });
                this.bombs.forEach(b => { b.y += b.vy * dt; });
                return this.age >= this.maxAge;
            }
            draw(ctx) {
                const progress = this.age / this.maxAge;
                const alpha = 1 - progress;
                
                ctx.save(); 
                ctx.translate(this.x, this.y);
                
                // Draw falling bombs
                ctx.fillStyle = `rgba(20,20,20,${alpha})`;
                this.bombs.forEach(b => {
                    ctx.save();
                    ctx.translate(b.x, b.y);
                    ctx.rotate(b.rot + this.age * 4);
                    ctx.fill(bombSVG);
                    ctx.restore();
                });

                // Draw Splatter
                ctx.fillStyle = this.color; 
                ctx.globalAlpha = alpha;
                this.particles.forEach(p => {
                    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
                });

                // Draw Blast Ring
                ctx.strokeStyle = this.color; ctx.lineWidth = 4 * alpha;
                ctx.beginPath(); ctx.arc(0, 0, progress * 60, 0, Math.PI*2); ctx.stroke();
                
                ctx.restore();
            }
        }

        // --- Core Setup & Input ---

        function initMap() {
            islands = []; fleets = []; effects = []; selectedIsland = null;
            const numIslands = Math.max(6, Math.floor((width * height) / 50000)); 
            
            for (let i = 0; i < numIslands; i++) {
                let x, y, radius, valid;
                for(let attempts=0; attempts<200; attempts++) {
                    valid = true;
                    radius = 35 + Math.random() * 40;
                    x = radius + 20 + Math.random() * (width - radius * 2 - 40);
                    y = radius + 80 + Math.random() * (height - radius * 2 - 100);

                    for (let j = 0; j < islands.length; j++) {
                        if (Math.hypot(islands[j].x - x, islands[j].y - y) < radius + islands[j].baseRadius + 60) {
                            valid = false; break;
                        }
                    }
                    if(valid) break;
                }
                if (valid) islands.push(new Island(x, y, radius, TEAM_NEUTRAL));
            }

            if (islands.length >= 2) {
                islands.sort((a,b) => a.y - b.y); 
                let p1 = islands[islands.length-1], p2 = islands[0];
                p1.owner = TEAM_PLAYER; p2.owner = TEAM_ENEMY;
                p1.baseRadius = p2.baseRadius = 65; 
                p1.planes = p2.planes = 60; p1.maxPlanes = p2.maxPlanes = 200;
            }
        }

        // Using pointerdown covers both Touch and Mouse reliably
        overlay.addEventListener('pointerdown', (e) => {
            e.preventDefault();
            if(!gameActive) {
                initAudio();
                initMap();
                gameActive = true;
                overlay.style.display = 'none';
            }
        });

        canvas.addEventListener('pointerdown', (e) => {
            e.preventDefault();
            if(!gameActive) return;

            const x = e.clientX, y = e.clientY;
            let clickedIsland = islands.find(i => Math.hypot(i.x - x, i.y - y) <= i.baseRadius);

            if (selectedIsland) {
                if (clickedIsland && clickedIsland !== selectedIsland) {
                    const sendCount = Math.floor(selectedIsland.planes / 2);
                    if (sendCount > 0) {
                        selectedIsland.planes -= sendCount;
                        fleets.push(new Fleet(selectedIsland, clickedIsland, sendCount));
                    }
                    selectedIsland = null;
                } else if (!clickedIsland) {
                    selectedIsland = null; // Clicked water
                }
            } else if (clickedIsland && clickedIsland.owner === TEAM_PLAYER) {
                selectedIsland = clickedIsland;
                playSound('launch'); // Tiny beep for selection confirmation
            }
        });

        function enemyAI() {
            islands.filter(i => i.owner === TEAM_ENEMY && i.planes > 25).forEach(island => {
                if (Math.random() < 0.015) { 
                    let targets = islands.filter(i => i.owner !== TEAM_ENEMY);
                    if(targets.length > 0) {
                        targets.forEach(t => t.aiScore = Math.hypot(t.x - island.x, t.y - island.y) + (t.planes * 5));
                        targets.sort((a,b) => a.aiScore - b.aiScore);
                        let target = Math.random() > 0.2 ? targets[0] : targets[Math.floor(Math.random() * targets.length)];
                        
                        const sendCount = Math.floor(island.planes / 2);
                        island.planes -= sendCount;
                        fleets.push(new Fleet(island, target, sendCount));
                    }
                }
            });
        }

        function checkWinCondition() {
            const pCount = islands.filter(i => i.owner === TEAM_PLAYER).length + fleets.filter(f => f.owner === TEAM_PLAYER).length;
            const eCount = islands.filter(i => i.owner === TEAM_ENEMY).length + fleets.filter(f => f.owner === TEAM_ENEMY).length;
            
            if (pCount === 0 || eCount === 0) {
                gameActive = false;
                overlay.style.display = 'flex';
                overlayText.innerText = pCount === 0 ? "DEFEAT" : "VICTORY!";
                overlayText.style.color = pCount === 0 ? COLORS[TEAM_ENEMY].border : COLORS[TEAM_PLAYER].border;
            }
        }

        // --- Main Game Loop ---

        function drawGrid(ctx) {
            ctx.strokeStyle = 'rgba(0, 255, 255, 0.03)'; ctx.lineWidth = 1;
            gridOffset = (gridOffset + 0.3) % 40;
            ctx.beginPath();
            for(let x = gridOffset; x < width; x += 40) { ctx.moveTo(x, 0); ctx.lineTo(x, height); }
            for(let y = gridOffset; y < height; y += 40) { ctx.moveTo(0, y); ctx.lineTo(width, y); }
            ctx.stroke();
        }

        function loop(timestamp) {
            const dt = Math.min((timestamp - lastTime) / 1000, 0.05); // Strict cap on delta time
            lastTime = timestamp;

            ctx.clearRect(0, 0, width, height);
            drawGrid(ctx);

            if (gameActive) {
                islands.forEach(i => i.update(dt));
                enemyAI();
                
                for (let i = fleets.length - 1; i >= 0; i--) {
                    if (fleets[i].update(dt)) fleets.splice(i, 1);
                }
                for (let i = effects.length - 1; i >= 0; i--) {
                    if (effects[i].update(dt)) effects.splice(i, 1);
                }
                checkWinCondition();
            }

            islands.forEach(i => i.draw(ctx));
            fleets.forEach(f => f.draw(ctx));
            effects.forEach(e => e.draw(ctx));

            requestAnimationFrame(loop);
        }

        requestAnimationFrame(timestamp => { lastTime = timestamp; loop(timestamp); });
    </script>
</body>
</html>
