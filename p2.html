<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pacific Strike: Advanced</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
            background-color: #042e54; /* Darker naval blue */
            touch-action: none; /* Prevent swipe-to-refresh */
            font-family: 'Courier New', Courier, monospace; user-select: none;
            -webkit-user-select: none;
        }
        canvas { display: block; }
        #ui-layer {
            position: absolute; top: 15px; left: 15px; color: #e0f7fa;
            pointer-events: none; text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            z-index: 5;
        }
        h1 { margin: 0; font-size: 1.5rem; text-transform: uppercase; letter-spacing: 2px;}
        p { margin: 5px 0 0 0; font-size: 0.9rem; opacity: 0.8;}
        
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 15, 30, 0.85); color: #00ffff; display: flex;
            flex-direction: column; align-items: center; justify-content: center; 
            font-size: 1.5rem; z-index: 10; cursor: pointer; text-align: center;
        }
        #overlay-subtext { font-size: 1rem; color: #aaaaaa; margin-top: 10px; }
    </style>
</head>
<body>
    <div id="overlay">
        <div id="overlay-title">TAP TO START</div>
        <div id="overlay-subtext">Audio requires interaction</div>
    </div>
    
    <div id="ui-layer">
        <h1>Pacific Strike</h1>
        <p>Tap Blue, tap Target. Tap water to cancel.</p>
    </div>
    
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const overlay = document.getElementById('overlay');
        const overlayTitle = document.getElementById('overlay-title');
        
        let width, height;
        let lastTime = 0;
        let gameActive = false;
        let gridOffset = 0;

        // --- Generative Audio Engine ---
        let audioCtx;
        function initAudio() {
            if(!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if(audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playSound(type) {
            if(!audioCtx || audioCtx.state !== 'running') return;
            const t = audioCtx.currentTime;
            
            if (type === 'launch') {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(400, t);
                osc.frequency.exponentialRampToValueAtTime(100, t + 0.15);
                gain.gain.setValueAtTime(0.08, t);
                gain.gain.exponentialRampToValueAtTime(0.01, t + 0.15);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(t); osc.stop(t + 0.15);
            } 
            else if (type === 'explosion') {
                const bufferSize = audioCtx.sampleRate * 0.4;
                const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
                
                const noise = audioCtx.createBufferSource();
                noise.buffer = buffer;
                
                const filter = audioCtx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(600, t);
                filter.frequency.exponentialRampToValueAtTime(50, t + 0.4);

                const gain = audioCtx.createGain();
                gain.gain.setValueAtTime(0.2, t);
                gain.gain.exponentialRampToValueAtTime(0.01, t + 0.4);
                
                noise.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
                noise.start(t);
            }
            else if (type === 'conquer') {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'square';
                osc.frequency.setValueAtTime(300, t);
                osc.frequency.linearRampToValueAtTime(600, t + 0.1);
                osc.frequency.linearRampToValueAtTime(900, t + 0.2);
                gain.gain.setValueAtTime(0.1, t);
                gain.gain.linearRampToValueAtTime(0, t + 0.3);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(t); osc.stop(t + 0.3);
            }
        }

        // --- SVG Paths rendered via Path2D ---
        const planeSVG = new Path2D("M 0,-12 C 2,-10 2,-4 2,-2 L 14,-2 L 14,2 L 2,2 L 2,8 L 6,10 L 6,12 L -6,12 L -6,10 L -2,8 L -2,2 L -14,2 L -14,-2 L -2,-2 C -2,-4 -2,-10 0,-12 Z");
        const bombSVG = new Path2D("M 0,-4 C 3,-2 3,3 0,6 C -3,3 -3,-2 0,-4 Z M -2,-6 L 2,-6 L 0,-4 Z");

        // Game Constants & Variables
        const TEAM_NEUTRAL = 0, TEAM_PLAYER = 1, TEAM_ENEMY = 2;
        const COLORS = {
            [TEAM_NEUTRAL]: { border: '#aaaaaa', fill: '#4E8752', glow: 'rgba(255,255,255,0.1)' },
            [TEAM_PLAYER]:  { border: '#00ffff', fill: '#3b7a57', glow: 'rgba(0,255,255,0.3)' },
            [TEAM_ENEMY]:   { border: '#ff3333', fill: '#7a3b3b', glow: 'rgba(255,51,51,0.3)' },
            sand: '#d4c098'
        };

        let islands = [], fleets = [], effects = [], selectedIsland = null;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- Classes ---

        class Island {
            constructor(x, y, radius, owner) {
                this.x = x; this.y = y; this.baseRadius = radius; this.owner = owner;
                this.maxPlanes = Math.floor(radius * 1.5);
                this.planes = owner === TEAM_NEUTRAL ? Math.floor(radius / 3) : 25;
                this.productionRate = radius / 40; 
                this.vertices = [];
                for (let i = 0; i < 18; i++) {
                    const angle = (i / 18) * Math.PI * 2;
                    const r = radius * (0.8 + Math.random() * 0.3); 
                    this.vertices.push({ x: Math.cos(angle) * r, y: Math.sin(angle) * r });
                }
            }

            update(dt) {
                if (this.owner !== TEAM_NEUTRAL && this.planes < this.maxPlanes) {
                    this.planes += this.productionRate * dt;
                }
            }

            draw(ctx) {
                // Tactical Glow
                ctx.fillStyle = COLORS[this.owner].glow;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.baseRadius + 10, 0, Math.PI * 2); ctx.fill();

                // Selection Ring
                if (this === selectedIsland) {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.baseRadius + 20 + Math.sin(Date.now()/150)*5, 0, Math.PI * 2);
                    ctx.strokeStyle = COLORS[this.owner].border;
                    ctx.lineWidth = 2; ctx.stroke();
                }

                // Terrain
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.fillStyle = COLORS.sand;
                ctx.strokeStyle = COLORS[this.owner].border;
                ctx.lineWidth = this === selectedIsland ? 4 : 2;
                ctx.beginPath();
                this.vertices.forEach((v, i) => i === 0 ? ctx.moveTo(v.x, v.y) : ctx.lineTo(v.x, v.y));
                ctx.closePath();
                ctx.fill(); ctx.stroke();
                
                ctx.fillStyle = COLORS[this.owner].fill;
                ctx.beginPath();
                this.vertices.forEach((v, i) => i === 0 ? ctx.moveTo(v.x * 0.65, v.y * 0.65) : ctx.lineTo(v.x * 0.65, v.y * 0.65));
                ctx.closePath();
                ctx.fill();
                ctx.restore();

                // Text Background for readability
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.beginPath(); ctx.arc(this.x, this.y, 14, 0, Math.PI*2); ctx.fill();

                // Text
                ctx.fillStyle = 'white'; ctx.font = 'bold 16px Courier New';
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(Math.floor(this.planes), this.x, this.y);
            }
        }

        class Fleet {
            constructor(source, target, count) {
                this.x = source.x; this.y = source.y; 
                this.target = target; this.count = count; this.owner = source.owner;
                this.speed = 100;
                this.angle = Math.atan2(target.y - source.y, target.x - source.x);
                this.age = 0;

                this.swarm = [];
                const visualPlanes = Math.min(count, 12); 
                for(let i=0; i<visualPlanes; i++) {
                    this.swarm.push({
                        offsetX: (Math.random() - 0.5) * 25,
                        offsetY: (Math.random() - 0.5) * 25,
                        phase: Math.random() * Math.PI * 2,
                        speed: 2 + Math.random() * 2
                    });
                }
                playSound('launch');
            }

            update(dt) {
                this.age += dt;
                this.x += Math.cos(this.angle) * this.speed * dt;
                this.y += Math.sin(this.angle) * this.speed * dt;

                if (Math.hypot(this.target.x - this.x, this.target.y - this.y) < this.target.baseRadius) {
                    this.arrive(); return true; 
                }
                return false;
            }

            arrive() {
                if (this.target.owner === this.owner) {
                    this.target.planes += this.count;
                } else {
                    this.target.planes -= this.count;
                    effects.push(new Explosion(this.target.x, this.target.y, COLORS[this.owner].border));
                    playSound('explosion');

                    if (this.target.planes < 0) {
                        this.target.owner = this.owner;
                        this.target.planes = Math.abs(this.target.planes);
                        playSound('conquer');
                    }
                }
            }

            draw(ctx) {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle + Math.PI/2); 

                ctx.fillStyle = COLORS[this.owner].border;
                this.swarm.forEach(p => {
                    const sway = Math.sin(this.age * p.speed + p.phase) * 6;
                    ctx.save();
                    ctx.translate(p.offsetX + sway, p.offsetY);
                    ctx.rotate(Math.sin(this.age * 8 + p.phase) * 0.08); 
                    ctx.fill(planeSVG);
                    ctx.restore();
                });

                ctx.rotate(-(this.angle + Math.PI/2));
                ctx.fillStyle = 'white'; ctx.font = '14px Courier New';
                ctx.fillText(Math.floor(this.count), 0, -25);
                ctx.restore();
            }
        }

        class Explosion {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.color = color;
                this.age = 0; this.maxAge = 0.6;
                this.particles = [];
                for(let i=0; i<8; i++){
                    this.particles.push({
                        dx: (Math.random()-0.5)*120, dy: (Math.random()-0.5)*120, size: Math.random()*3 + 1
                    });
                }
            }
            update(dt) {
                this.age += dt; return this.age >= this.maxAge;
            }
            draw(ctx) {
                const progress = this.age / this.maxAge;
                const alpha = 1 - progress;
                ctx.save(); ctx.translate(this.x, this.y);
                
                ctx.fillStyle = this.color; ctx.globalAlpha = alpha;
                this.particles.forEach(p => {
                    ctx.beginPath(); ctx.arc(p.dx * progress, p.dy * progress, p.size, 0, Math.PI*2); ctx.fill();
                });

                ctx.strokeStyle = this.color; ctx.lineWidth = 3 * alpha;
                ctx.beginPath(); ctx.arc(0, 0, progress * 45, 0, Math.PI*2); ctx.stroke();
                ctx.restore();
            }
        }

        // --- Core Game Functions ---

        function initMap() {
            islands = []; fleets = []; effects = []; selectedIsland = null;
            const numIslands = Math.max(6, Math.floor((width * height) / 45000)); 
            
            for (let i = 0; i < numIslands; i++) {
                let x, y, radius, valid;
                for(let attempts=0; attempts<150; attempts++) {
                    valid = true;
                    radius = 35 + Math.random() * 45;
                    x = radius + 20 + Math.random() * (width - radius * 2 - 40);
                    y = radius + 80 + Math.random() * (height - radius * 2 - 100);

                    for (let j = 0; j < islands.length; j++) {
                        if (Math.hypot(islands[j].x - x, islands[j].y - y) < radius + islands[j].baseRadius + 60) {
                            valid = false; break;
                        }
                    }
                    if(valid) break;
                }
                if (valid) islands.push(new Island(x, y, radius, TEAM_NEUTRAL));
            }

            if (islands.length >= 2) {
                islands.sort((a,b) => a.y - b.y); // Sort by Y to put one top, one bottom
                let p1 = islands[islands.length-1], p2 = islands[0];
                p1.owner = TEAM_PLAYER; p2.owner = TEAM_ENEMY;
                p1.baseRadius = p2.baseRadius = 60; 
                p1.planes = p2.planes = 50; p1.maxPlanes = p2.maxPlanes = 150;
            }
        }

        function checkWinCondition() {
            const pCount = islands.filter(i => i.owner === TEAM_PLAYER).length + fleets.filter(f => f.owner === TEAM_PLAYER).length;
            const eCount = islands.filter(i => i.owner === TEAM_ENEMY).length + fleets.filter(f => f.owner === TEAM_ENEMY).length;
            
            if (pCount === 0 || eCount === 0) {
                gameActive = false;
                overlay.style.display = 'flex';
                overlayTitle.innerText = pCount === 0 ? "DEFEAT" : "VICTORY";
                overlayTitle.style.color = pCount === 0 ? COLORS[TEAM_ENEMY].border : COLORS[TEAM_PLAYER].border;
                document.getElementById('overlay-subtext').innerText = "Tap to Restart";
            }
        }

        function enemyAI() {
            islands.filter(i => i.owner === TEAM_ENEMY && i.planes > 20).forEach(island => {
                if (Math.random() < 0.01) { // 1% chance per frame per island
                    let targets = islands.filter(i => i.owner !== TEAM_ENEMY);
                    if(targets.length > 0) {
                        // Score targets based on distance and weakness
                        targets.forEach(t => {
                            const dist = Math.hypot(t.x - island.x, t.y - island.y);
                            t.aiScore = dist + (t.planes * 5); // Lower score is better
                        });
                        targets.sort((a,b) => a.aiScore - b.aiScore);
                        
                        // Pick top target usually, occasionally random
                        let target = Math.random() > 0.3 ? targets[0] : targets[Math.floor(Math.random() * targets.length)];
                        
                        const sendCount = Math.floor(island.planes / 2);
                        island.planes -= sendCount;
                        fleets.push(new Fleet(island, target, sendCount));
                    }
                }
            });
        }

        // --- Inputs ---

        function handleStart(e) {
            e.preventDefault();
            if(!gameActive) {
                initAudio();
                initMap();
                gameActive = true;
                overlay.style.display = 'none';
            }
        }
        overlay.addEventListener('mousedown', handleStart);
        overlay.addEventListener('touchstart', handleStart, { passive: false });

        function handleInteraction(x, y) {
            if(!gameActive) return;

            let clickedIsland = islands.find(i => Math.hypot(i.x - x, i.y - y) <= i.baseRadius);

            if (selectedIsland) {
                if (clickedIsland && clickedIsland !== selectedIsland) {
                    const sendCount = Math.floor(selectedIsland.planes / 2);
                    if (sendCount > 0) {
                        selectedIsland.planes -= sendCount;
                        fleets.push(new Fleet(selectedIsland, clickedIsland, sendCount));
                    }
                    selectedIsland = null;
                } else if (!clickedIsland) {
                    selectedIsland = null; // Clicked water, deselect
                }
            } else if (clickedIsland && clickedIsland.owner === TEAM_PLAYER) {
                selectedIsland = clickedIsland;
                playSound('launch'); 
            }
        }

        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleInteraction(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
        canvas.addEventListener('mousedown', (e) => handleInteraction(e.clientX, e.clientY));

        // --- Loop and Rendering ---

        function drawGrid(ctx) {
            ctx.strokeStyle = 'rgba(0, 255, 255, 0.05)';
            ctx.lineWidth = 1;
            const gridSize = 50;
            gridOffset = (gridOffset + 0.2) % gridSize;

            ctx.beginPath();
            for(let x = gridOffset; x < width; x += gridSize) { ctx.moveTo(x, 0); ctx.lineTo(x, height); }
            for(let y = gridOffset; y < height; y += gridSize) { ctx.moveTo(0, y); ctx.lineTo(width, y); }
            ctx.stroke();
        }

        function loop(timestamp) {
            const dt = Math.min((timestamp - lastTime) / 1000, 0.1); 
            lastTime = timestamp;

            ctx.clearRect(0, 0, width, height);
            drawGrid(ctx);

            if (gameActive) {
                islands.forEach(i => i.update(dt));
                enemyAI();
                
                for (let i = fleets.length - 1; i >= 0; i--) {
                    if (fleets[i].update(dt)) fleets.splice(i, 1);
                }
                for (let i = effects.length - 1; i >= 0; i--) {
                    if (effects[i].update(dt)) effects.splice(i, 1);
                }
                checkWinCondition();
            }

            islands.forEach(i => i.draw(ctx));
            fleets.forEach(f => f.draw(ctx));
            effects.forEach(e => e.draw(ctx));

            requestAnimationFrame(loop);
        }

        requestAnimationFrame(timestamp => { lastTime = timestamp; loop(timestamp); });

    </script>
</body>
</html>
